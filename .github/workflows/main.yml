name: Zecpath ATS & HR Interview AI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  build-and-test:

    runs-on: windows-latest

    steps:

      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Upgrade Pip
      - name: Upgrade Pip
        run: |
          python -m pip install --upgrade pip

      # Install Dependencies
      - name: Install Requirements
        run: |
          pip install -r requirements.txt

      # Install SpaCy Model
      - name: Download SpaCy Model
        run: |
          python -m spacy download en_core_web_sm

      # Install Poppler (Windows)
      - name: Install Poppler
        shell: powershell
        run: |
          choco install poppler -y

      # Install Tesseract OCR
      - name: Install Tesseract OCR
        shell: powershell
        run: |
          choco install tesseract -y

      # Run Tests
      - name: Run Pytest
        run: |
          pytest

      # FastAPI Validation
      - name: FastAPI Validation
        run: |
          python -c "from main import app; print('FastAPI Loaded Successfully')"